name: backend-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qr_ordering_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # CI's DATABASE_URL wins over the committed .env.test (the vitest config
      # never overrides an already-set env var).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qr_ordering_test?schema=public
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-0123456789abcdef0123456789
      PRINT_AGENT_API_KEY: ci-print-agent-key
      CORS_ORIGIN: '*'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx tsx prisma/seed.ts
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
