services:
  postgres:
    image: postgres:16-alpine
    container_name: qr-ordering-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qr_ordering
    ports:
      # Host port 5433 -> container 5432 (5432 is often already taken by
      # another local Postgres). DATABASE_URL points at localhost:5433.
      - '5433:5432'
    volumes:
      - qr_ordering_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d qr_ordering']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  qr_ordering_pg:
